spring:
  application:
    name: gateway

server:
  port: 9090
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

orchestrator:
  base-url: ${ORCHESTRATOR_BASEURL:http://localhost:8080}

gateway:
  sse:
    timeout: 90000
  cors:
    allowed-origin: ${GATEWAY_CORS_ORIGIN:http://localhost:5173}

resilience4j:
  circuitbreaker:
    instances:
      orchestrator:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  endpoint:
    health:
      show-details: always
