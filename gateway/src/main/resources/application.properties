spring.application.name=gateway
server.port=8080

# URL do Orquestrador (sobrescrever via variável de ambiente em produção)
orquestrador.url=http://localhost:8000

# Resilience4j — Circuit Breaker para o Orquestrador
resilience4j.circuitbreaker.instances.orquestrador.sliding-window-size=5
resilience4j.circuitbreaker.instances.orquestrador.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.orquestrador.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.orquestrador.permitted-number-of-calls-in-half-open-state=2

# Timeout do SseEmitter (ms)
gateway.sse.timeout=30000

# CORS
gateway.cors.allowed-origin=http://localhost:5173
