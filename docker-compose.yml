services:
  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8000:8000"
    volumes:
      - ./chromadb_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-clima:
    build: ./mcp-clima
    ports:
      - "8081:8081"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  orchestrator:
    build: ./orchestrator
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - MCP_CLIMA_URL=http://mcp-clima:8081
    volumes:
      - ./data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
      mcp-clima:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    build: ./gateway
    ports:
      - "9090:9090"
    environment:
      - ORCHESTRATOR_BASEURL=http://orchestrator:8080
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
