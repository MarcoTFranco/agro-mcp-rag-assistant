server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: redireciona rotas desconhecidas para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api para o gateway (nome do serviço no Docker Compose)
    location /api/ {
        proxy_pass http://gateway:8080/api/;
        proxy_http_version 1.1;

        # Necessário para SSE: desabilita buffer para que os eventos
        # cheguem ao cliente em tempo real
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
